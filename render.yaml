# Render.com blueprint for the dashboard.
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" and
# point it at the repo. Render builds the Dockerfile and assigns a public URL.
services:
  - type: web
    name: synthetic-learner-harness
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SLH_WEB_SEEDS
        value: "25"
